<!DOCTYPE html>
<html lang="{{ request.locale.iso_code }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fd7ad4">
    <title>{{#if page_title}}{{ page_title }}{{else}}Store Access{{/if}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jost:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 36%),
          linear-gradient(180deg, #ffffff 0%, #f0f1ff 100%);
        color: #424cab;
        font-family: 'Poppins', sans-serif;
      }

      h1, h2, h3 {
        font-family: 'Bagel Fat One', cursive;
      }
    </style>
    {{#content "header"}}{{/content}}
    <link href="{{ "theme.css" | asset_url() }}" rel="stylesheet">
    <link href="{{ "blind-box-product-shell.css" | asset_url() }}" rel="stylesheet">
    <script>
      window.routes = {
        cart_change_url: "{{ routes.cart_change_url }}",
        search_url: "{{ routes.search_url }}"
      };
    </script>
  </head>
  <body class="layout-password">
    {{#content "layout"}}{{/content}}
    <script src="{{ "theme-interactions.js" | asset_url() }}" defer></script>
    {{#content "footer"}}{{/content}}
  </body>
</html>
