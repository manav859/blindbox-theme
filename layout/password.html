<!DOCTYPE html>
<html lang="{{ request.locale.iso_code }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#b97819">
    <title>{{#if page_title}}{{ page_title }}{{else}}Store Access{{/if}}</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 36%),
          linear-gradient(180deg, #f9f5ef 0%, #f5efe6 100%);
        color: #17202a;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
    </style>
    {{#content "header"}}{{/content}}
    <link href="{{ "theme.css" | asset_url() }}" rel="stylesheet">
    <link href="{{ "blind-box-product-shell.css" | asset_url() }}" rel="stylesheet">
    <script>
      window.routes = {
        cart_change_url: "{{ routes.cart_change_url }}",
        search_url: "{{ routes.search_url }}"
      };
    </script>
  </head>
  <body class="layout-password">
    {{#content "layout"}}{{/content}}
    <script src="{{ "theme-interactions.js" | asset_url() }}" defer></script>
    {{#content "footer"}}{{/content}}
  </body>
</html>
