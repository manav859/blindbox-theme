<!DOCTYPE html>
<html lang="{{ request.locale.iso_code }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#b97819">
    <style>
      :root {
        --blind-box-page-background: #f5efe6;
        --blind-box-page-text: #17202a;
        --blind-box-page-muted: #5d6877;
        --blind-box-page-accent: #b97819;
        --blind-box-page-card: rgba(255, 255, 255, 0.84);
        --blind-box-page-border: rgba(23, 32, 42, 0.08);
        --blind-box-page-shadow: 0 28px 64px rgba(23, 32, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 34%),
          linear-gradient(180deg, #f9f5ef 0%, var(--blind-box-page-background) 100%);
        color: var(--blind-box-page-text);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      a {
        color: inherit;
      }
    </style>
    {{#content "header" /}}
    <link href="{{`theme.css` | asset_url()}}" rel="stylesheet">
    <link href="{{`blind-box-product-shell.css` | asset_url()}}" rel="stylesheet">
  </head>
  <body class="layout-{{ layout.name }}">
    <div class="store-shell">
      <div class="store-shell__announcement">
        Fresh drops, sealed picks, and surprise reveals.
      </div>
      <header class="store-shell__header">
        <a class="store-shell__brand" href="/">
          <img class="store-shell__brand-mark" src="{{`logo.png` | asset_url()}}" alt="Blind Box Atelier">
          <span>Blind Box Atelier</span>
        </a>
        <nav class="store-shell__nav" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/collections/all">Catalog</a>
          <a href="/search">Search</a>
          <a href="/cart">Cart</a>
        </nav>
        <a class="store-shell__cta" href="/collections/all">Shop the Drop</a>
      </header>
      <main class="store-shell__main">
        {{#content "layout" /}}
      </main>
      <footer class="store-shell__footer">
        <div>
          <strong>Blind Box Atelier</strong>
          <p>Retail-style storefront shell for curated mystery drops and collector launches.</p>
        </div>
        <div class="store-shell__footer-links">
          <a href="/collections/all">Catalog</a>
          <a href="/search">Search</a>
          <a href="/cart">Cart</a>
        </div>
      </footer>
    </div>
    {{#content "footer" /}}
  </body>
</html>
