<!DOCTYPE html>
<html lang="{{ request.locale.iso_code }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="{{#if theme.settings.color_accent}}{{ theme.settings.color_accent }}{{else}}#7a5c32{{/if}}">
    <title>{{#if page_title}}{{ page_title }}{{else}}Blind Box Atelier{{/if}}</title>
    {{#if page_description}}
      <meta name="description" content="{{ page_description }}">
    {{/if}}
    <style>
      :root {
        --blind-box-page-background: {{#if theme.settings.color_page_background}}{{ theme.settings.color_page_background }}{{else}}#f4efe8{{/if}};
        --blind-box-page-text: {{#if theme.settings.color_text}}{{ theme.settings.color_text }}{{else}}#1f1b17{{/if}};
        --blind-box-page-muted: #6e645a;
        --blind-box-page-accent: {{#if theme.settings.color_accent}}{{ theme.settings.color_accent }}{{else}}#7a5c32{{/if}};
        --blind-box-page-card: rgba(255, 251, 247, 0.9);
        --blind-box-page-border: rgba(31, 27, 23, 0.09);
        --blind-box-page-shadow: 0 24px 58px rgba(31, 27, 23, 0.08);
        --blind-box-page-ink-soft: #f8f2ea;
        --blind-box-page-heading-font: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        --blind-box-page-body-font: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        --blind-box-page-radius-xl: 1.75rem;
        --blind-box-page-radius-lg: 1.25rem;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.82), transparent 32%),
          radial-gradient(circle at top right, rgba(212, 193, 168, 0.18), transparent 28%),
          linear-gradient(180deg, #faf6f0 0%, var(--blind-box-page-background) 100%);
        color: var(--blind-box-page-text);
        font-family: var(--blind-box-page-body-font);
      }

      a {
        color: inherit;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--blind-box-page-heading-font);
        font-weight: 700;
      }
    </style>
    {{#content "header" /}}
    <link href="{{`theme.css` | asset_url()}}" rel="stylesheet">
    <script src="{{`blind-box-theme-core.js` | asset_url()}}" defer></script>
    <script>
      window.routes = {
        cart_change_url: "{{ routes.cart_change_url }}",
        search_url: "{{ routes.search_url }}"
      };
    </script>
  </head>
  <body class="layout-{{ layout.name }}">
    <div class="store-shell">
      {{#section "storefront-header" /}}
      <main class="store-shell__main">
        {{#content "layout" /}}
      </main>
      {{#section "storefront-footer" /}}
    </div>
    <script src="{{`theme-interactions.js` | asset_url()}}" defer></script>
    {{#content "footer" /}}
  </body>
</html>
