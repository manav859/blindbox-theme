<!DOCTYPE html>
<html lang="{{ request.locale.iso_code }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="{{#if theme.settings.color_accent}}{{ theme.settings.color_accent }}{{else}}#fd7ad4{{/if}}">
    <title>{{#if page_title}}{{ page_title }}{{else}}Blind Box Store{{/if}}</title>
    {{#if page_description}}
      <meta name="description" content="{{ page_description }}">
    {{/if}}

    <!-- Sipply1 / Fashion fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Jost:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* ── Sipply1 "Fashion" design tokens ── */
      :root {
        /* Core palette */
        --sp-primary: {{#if theme.settings.color_text}}{{ theme.settings.color_text }}{{else}}#424cab{{/if}};
        --sp-accent: {{#if theme.settings.color_accent}}{{ theme.settings.color_accent }}{{else}}#fd7ad4{{/if}};
        --sp-bg: {{#if theme.settings.color_page_background}}{{ theme.settings.color_page_background }}{{else}}#FFFFFF{{/if}};
        --sp-light-text: {{#if theme.settings.color_light_text}}{{ theme.settings.color_light_text }}{{else}}#949494{{/if}};
        --sp-entry-line: {{#if theme.settings.color_entry_line}}{{ theme.settings.color_entry_line }}{{else}}#DDDDDD{{/if}};
        --sp-secondary-bg: {{#if theme.settings.color_secondary_bg}}{{ theme.settings.color_secondary_bg }}{{else}}#d2d6ff{{/if}};
        --sp-dark-bg: {{#if theme.settings.color_dark_bg}}{{ theme.settings.color_dark_bg }}{{else}}#424cab{{/if}};

        /* Derived */
        --sp-card-bg: rgba(255, 255, 255, 0.92);
        --sp-card-border: rgba(66, 76, 171, 0.10);
        --sp-card-shadow: 0 24px 58px rgba(66, 76, 171, 0.08);
        --sp-ink-soft: #d2d6ff;

        /* Typography */
        --sp-title-font: 'Bagel Fat One', cursive;
        --sp-heading-font: 'Jost', sans-serif;
        --sp-body-font: 'Poppins', sans-serif;

        /* Shape tokens */
        --sp-radius-button: 24px;
        --sp-radius-card: 12px;
        --sp-radius-input: 40px;
        --sp-radius-xl: 1.75rem;
        --sp-radius-lg: 1.25rem;

        /* Legacy compat aliases */
        --blind-box-page-background: var(--sp-bg);
        --blind-box-page-text: var(--sp-primary);
        --blind-box-page-muted: var(--sp-light-text);
        --blind-box-page-accent: var(--sp-accent);
        --blind-box-page-card: var(--sp-card-bg);
        --blind-box-page-border: var(--sp-card-border);
        --blind-box-page-shadow: var(--sp-card-shadow);
        --blind-box-page-ink-soft: var(--sp-ink-soft);
        --blind-box-page-heading-font: var(--sp-title-font);
        --blind-box-page-body-font: var(--sp-body-font);
        --blind-box-page-radius-xl: var(--sp-radius-xl);
        --blind-box-page-radius-lg: var(--sp-radius-lg);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--sp-bg);
        color: var(--sp-primary);
        font-family: var(--sp-body-font);
        font-weight: 300;
        font-size: 14px;
        line-height: 1.6;
      }

      a { color: inherit; }

      h1, h2, h3 {
        font-family: var(--sp-title-font);
        font-weight: 400;
      }

      h4, h5, h6 {
        font-family: var(--sp-heading-font);
        font-weight: 500;
      }
    </style>
    {{#content "header"}}{{/content}}
    <link href="{{ "theme.css" | asset_url() }}" rel="stylesheet">
    <link href="{{ "blind-box-product-shell.css" | asset_url() }}" rel="stylesheet">
    <script src="{{ "blind-box-theme-core.js" | asset_url() }}" defer></script>
    <script src="{{ "blind-box-product-shell.js" | asset_url() }}" defer></script>
    <script>
      window.routes = {
        cart_change_url: "{{ routes.cart_change_url }}",
        search_url: "{{ routes.search_url }}"
      };
    </script>
  </head>
  <body class="layout-{{ layout.name }}">
    <div class="store-shell">
      {{#section "storefront-header"}}{{/section}}
      <main class="store-shell__main">
        {{#content "layout"}}{{/content}}
      </main>
      {{#section "storefront-footer"}}{{/section}}
    </div>
    <script src="{{ "theme-interactions.js" | asset_url() }}" defer></script>
    {{#content "footer"}}{{/content}}
  </body>
</html>
